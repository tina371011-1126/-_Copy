<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100天禪定打卡計畫</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFFFFF; color: #334155; }
        .nav-shadow { box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo } = React;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbylgmrDktw1X5h2d7gRiLZirQSDQLJF2N-WlsmB3eyEwAYsAqhQ9m0YF29T_ImGLDAT/exec";
        const GOOGLE_CLIENT_ID = "898764620568-6h1uavirukt1k1vpfomfdbge74823vm.apps.googleusercontent.com";
        const CHAKRAS = ["腹式呼吸", "名色", "無始", "無明", "吉祥", "如意", "明心", "二空", "智慧", "法眼", "禪心"];

        const durationColor = (min) => {
            const m = Number(min);
            if (m >= 60) return 'bg-purple-500 text-white';
            if (m >= 40) return 'bg-orange-400 text-white';
            return 'bg-emerald-500 text-white';
        };

        const Icon = ({ name, className = "" }) => {
            const icons = {
                Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                Trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55-.47.98-.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>,
                Plus: <><path d="M12 5v14M5 12h14"/></>,
                Book: <><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/></>,
                Users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                Edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                Trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10"/>}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const [searchTerm, setSearchTerm] = useState('');
            const [filterChakra, setFilterChakra] = useState('');
            const [currentPage, setCurrentPage] = useState(1);

            const [formData, setFormData] = useState({
                duration: '', reflection: '', focusChakra: '腹式呼吸',
                practiceDate: new Date().toISOString().split('T')[0]
            });

            const fetchLogs = async () => {
                try {
                    const controller = new AbortController();
                    const timer = setTimeout(() => controller.abort(), 8000);
                    const res = await fetch(GAS_URL, { signal: controller.signal });
                    clearTimeout(timer);
                    const data = await res.json();
                    setLogs(Array.isArray(data) ? data : []);
                } catch (e) {
                    console.error('fetchLogs error:', e);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                window.handleGoogleLogin = (response) => {
                    try {
                        const base64 = response.credential.split('.')[1]
                            .replace(/-/g, '+').replace(/_/g, '/');
                        const payload = JSON.parse(atob(base64));
                        const loggedInUser = {
                            email: payload.email,
                            name: payload.name || payload.given_name || payload.email
                        };
                        setUser(loggedInUser);
                        localStorage.setItem('zenUser', JSON.stringify(loggedInUser));
                    } catch(err) {
                        console.error('Google login parse error:', err);
                    }
                };

                const saved = localStorage.getItem('zenUser');
                if (saved) {
                    try { setUser(JSON.parse(saved)); } catch(e) {}
                }

                fetchLogs();
            }, []);

            useEffect(() => {
                if (!loading && !user) {
                    const tryRender = () => {
                        if (window.google && document.getElementById("google-login-btn")) {
                            window.google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: window.handleGoogleLogin });
                            window.google.accounts.id.renderButton(
                                document.getElementById("google-login-btn"),
                                { theme: "outline", size: "large", text: "signin_with" }
                            );
                        } else {
                            setTimeout(tryRender, 300);
                        }
                    };
                    tryRender();
                }
            }, [loading, user]);

            const myLogs = useMemo(() =>
                logs.filter(l => l && l.date && l.email === user?.email)
                    .sort((a, b) => (b.date || '').localeCompare(a.date || ''))
            , [logs, user]);

            const filteredLogs = useMemo(() => {
                return logs.filter(l =>
                    l && l.date &&
                    (searchTerm === '' || (l.name || '').includes(searchTerm)) &&
                    (filterChakra === '' || l.chakra === filterChakra)
                );
            }, [logs, searchTerm, filterChakra]);

            const paginatedLogs = useMemo(() => {
                const start = (currentPage - 1) * 10;
                return filteredLogs.slice(start, start + 10);
            }, [filteredLogs, currentPage]);

            const stats = useMemo(() => {
                const dates = [...new Set(myLogs.map(l => (l.date || '').split('T')[0]).filter(Boolean))].sort();
                return { total: dates.length, streak: dates.length > 0 ? 1 : 0 };
            }, [myLogs]);

            const calendarMap = useMemo(() => {
                const map = {};
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth();
                myLogs.forEach(l => {
                    const dateStr = (l.date || '').split('T')[0];
                    const d = new Date(dateStr + 'T00:00:00');
                    if (d.getFullYear() === year && d.getMonth() === month) {
                        const day = d.getDate();
                        const dur = Number(l.duration) || 0;
                        map[day] = Math.max(map[day] || 0, dur);
                    }
                });
                return map;
            }, [myLogs]);

            const isFormValid = formData.practiceDate && formData.duration && formData.reflection.trim();

            if (loading) return (
                <div style={{display:'flex',height:'100vh',alignItems:'center',justifyContent:'center',color:'#059669',fontWeight:'bold',fontSize:'18px'}}>
                    載入中...
                </div>
            );

            if (!user) return (
                <div className="flex flex-col items-center justify-center h-screen bg-white p-10 text-center">
                    <h1 className="text-4xl font-black text-emerald-600 mb-4">100天禪定打卡計劃</h1>
                    <p className="text-slate-400 mb-12">「禪令忙碌的人找到寧靜」</p>
                    <div id="google-login-btn"></div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white pb-24">
                    <header className="p-6 pt-10 text-center border-b border-slate-50">
                        <p className="text-xs font-medium text-slate-500 leading-relaxed mb-2">
                            「禪令忙碌的人找到寧靜，禪令痛苦的人解脫煩惱，<br/>禪令快樂的人獲得智慧，禪令不平凡的人，明瞭平凡的真諦。」
                        </p>
                        <p className="text-[10px] text-emerald-600 font-bold">禪宗第 85 代宗師 悟覺妙天禪師</p>
                    </header>

                    <main className="p-5">
                        {view === 'home' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black">你好, {user.name}</h2>
                                    <button onClick={() => {setUser(null); localStorage.clear();}} className="text-slate-300 text-xs font-bold">登出</button>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-[2rem]">
                                    <h3 className="font-bold text-slate-700 mb-4">禪定日曆</h3>
                                    {Object.keys(calendarMap).length === 0 ? (
                                        <p className="text-center text-slate-300 text-sm py-4">本月尚無禪定紀錄，快去打卡吧！</p>
                                    ) : (
                                        <div className="grid grid-cols-7 gap-2">
                                            {Array.from({length: 31}).map((_, i) => {
                                                const day = i + 1;
                                                const dur = calendarMap[day];
                                                const hasLog = dur !== undefined;
                                                return (
                                                    <div key={i} className={`aspect-square flex items-center justify-center rounded-full text-[10px] font-bold ${hasLog ? durationColor(dur) : 'bg-white text-slate-200'}`}>
                                                        {day}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                    <div className="flex gap-3 mt-4 justify-center text-[10px] font-bold text-slate-400">
                                        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-emerald-500 inline-block"></span>&lt;40分</span>
                                        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-orange-400 inline-block"></span>40-59分</span>
                                        <span className="flex items-center gap-1"><span className="w-3 h-3 rounded-full bg-purple-500 inline-block"></span>60分+</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'progress' && (
                            <div className="space-y-6">
                                <h2 className="text-xl font-black text-emerald-700">成長進度</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-emerald-50 p-5 rounded-3xl text-center">
                                        <p className="text-xs text-emerald-600 font-bold">累積天數</p>
                                        <p className="text-3xl font-black text-emerald-700">{stats.total}</p>
                                    </div>
                                    <div className="bg-orange-50 p-5 rounded-3xl text-center">
                                        <p className="text-xs text-orange-600 font-bold">連續挑戰</p>
                                        <p className="text-3xl font-black text-orange-700">{stats.streak}天</p>
                                    </div>
                                </div>
                                <div className="bg-slate-50 p-5 rounded-3xl space-y-3">
                                    <h4 className="font-bold text-sm">成就階級</h4>
                                    {[
                                        {l: "Level 1", n: "建立習慣", t: 30},
                                        {l: "Level 2", n: "穩定練習", t: 50},
                                        {l: "Level 3", n: "高度投入", t: 70},
                                        {l: "Level 4", n: "進階挑戰", t: 100}
                                    ].map(lv => (
                                        <div key={lv.l} className={`flex justify-between p-3 rounded-xl ${stats.total >= lv.t ? 'bg-emerald-100 text-emerald-700' : 'bg-white text-slate-300'}`}>
                                            <span className="text-xs font-bold">{lv.l} {lv.n}</span>
                                            <span className="text-xs font-black">{lv.t}次</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'record' && (
                            <div className="space-y-4">
                                <h2 className="text-xl font-black">紀錄您的禪定</h2>
                                <input type="date" className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold" value={formData.practiceDate} onChange={e=>setFormData({...formData, practiceDate:e.target.value})} />
                                <input type="number" placeholder="時長 (分鐘)" className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold" value={formData.duration} onChange={e=>setFormData({...formData, duration:e.target.value})} />
                                <select className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold" value={formData.focusChakra} onChange={e=>setFormData({...formData, focusChakra:e.target.value})}>
                                    {CHAKRAS.map(c=><option key={c} value={c}>{c}</option>)}
                                </select>
                                <textarea placeholder="今日心得..." className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold min-h-[120px]" value={formData.reflection} onChange={e=>setFormData({...formData, reflection:e.target.value})} />

                                {!isFormValid && (
                                    <p className="text-xs text-red-400 font-bold text-center">請填寫日期、時長與心得後再送出</p>
                                )}

                                <button
                                    disabled={!isFormValid || isSubmitting}
                                    onClick={async () => {
                                        setIsSubmitting(true);
                                        const newLog = {
                                            email: user.email,
                                            name: user.name,
                                            date: formData.practiceDate,
                                            duration: formData.duration,
                                            chakra: formData.focusChakra,
                                            reflection: formData.reflection
                                        };
                                        // 樂觀更新：立刻反映在畫面上
                                        setLogs(prev => [newLog, ...prev]);

                                        try {
                                            await fetch(GAS_URL, {
                                                method: 'POST',
                                                mode: 'no-cors',
                                                body: JSON.stringify({ ...newLog, action: 'add' })
                                            });
                                        } catch(e) {
                                            console.error('POST error:', e);
                                        }

                                        alert("紀錄成功！");
                                        setFormData({ duration: '', reflection: '', focusChakra: '腹式呼吸', practiceDate: new Date().toISOString().split('T')[0] });
                                        setView('personal');
                                        setIsSubmitting(false);

                                        // 3 秒後背景靜默重新同步一次
                                        setTimeout(() => fetchLogs(), 3000);
                                    }}
                                    className={`w-full py-5 rounded-3xl font-black text-white transition-all ${
                                        !isFormValid || isSubmitting
                                            ? 'bg-slate-200 text-slate-400 cursor-not-allowed'
                                            : Number(formData.duration) >= 60 ? 'bg-purple-500'
                                            : Number(formData.duration) >= 40 ? 'bg-orange-500'
                                            : 'bg-emerald-600'
                                    }`}
                                >
                                    {isSubmitting ? '同步中...' : `送出紀錄 ${Number(formData.duration) >= 60 ? '(2.0x)' : Number(formData.duration) >= 40 ? '(1.5x)' : ''}`}
                                </button>
                            </div>
                        )}

                        {view === 'personal' && (
                            <div className="space-y-4">
                                <h2 className="text-xl font-black">我的禪定日誌</h2>
                                {myLogs.length === 0 && (
                                    <p className="text-center text-slate-300 text-sm py-8">尚無紀錄</p>
                                )}
                                {myLogs.map((log, i) => (
                                    <div key={i} className="bg-slate-50 p-4 rounded-2xl">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <p className="text-[10px] font-bold text-emerald-600">{(log.date || '').split('T')[0]}</p>
                                                <p className="font-bold">{log.duration}min · {log.chakra}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button className="p-2 text-slate-400"><Icon name="Edit" /></button>
                                                <button className="p-2 text-slate-400 hover:text-red-500"><Icon name="Trash" /></button>
                                            </div>
                                        </div>
                                        <p className="text-xs text-slate-500 mt-2 italic">「{log.reflection}」</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'partners' && (
                            <div className="space-y-4">
                                <div className="flex gap-2">
                                    <input placeholder="搜尋人名..." className="flex-1 p-3 bg-slate-50 rounded-xl text-xs border-none" onChange={e=>{setSearchTerm(e.target.value); setCurrentPage(1);}} />
                                    <select className="p-3 bg-slate-50 rounded-xl text-xs border-none" onChange={e=>{setFilterChakra(e.target.value); setCurrentPage(1);}}>
                                        <option value="">所有脈輪</option>
                                        {CHAKRAS.map(c=><option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                {paginatedLogs.length === 0 && (
                                    <p className="text-center text-slate-300 text-sm py-8">查無紀錄</p>
                                )}
                                <div className="space-y-3">
                                    {paginatedLogs.map((log, i) => (
                                        <div key={i} className="border-b border-slate-100 pb-3">
                                            <div className="flex justify-between text-[10px] font-bold text-slate-400 mb-1">
                                                <span>{log.name}</span><span>{(log.date || '').split('T')[0]}</span>
                                            </div>
                                            <p className="text-xs font-bold text-slate-700">{log.duration}min · {log.chakra}</p>
                                            <p className="text-[11px] text-slate-500 truncate italic">「{log.reflection}」</p>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex justify-center gap-4 pt-4">
                                    <button onClick={()=>setCurrentPage(p=>Math.max(1, p-1))} className="text-xs font-bold text-emerald-600">上一頁</button>
                                    <span className="text-xs font-bold text-slate-300">{currentPage} / {Math.max(1, Math.ceil(filteredLogs.length / 10))}</span>
                                    <button onClick={()=>setCurrentPage(p=>Math.min(Math.ceil(filteredLogs.length/10)||1, p+1))} className="text-xs font-bold text-emerald-600">下一頁</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-md rounded-[2.5rem] p-2 flex justify-around items-center nav-shadow border border-slate-100">
                        {[
                            {id:'home', icon:'Home'}, {id:'progress', icon:'Trophy'},
                            {id:'record', icon:'Plus'}, {id:'personal', icon:'Book'}, {id:'partners', icon:'Users'}
                        ].map(item => (
                            <button key={item.id} onClick={()=>setView(item.id)} className={`p-4 rounded-full transition-all ${view===item.id?'bg-emerald-600 text-white shadow-lg shadow-emerald-200': 'text-slate-300'}`}>
                                <Icon name={item.icon} />
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
