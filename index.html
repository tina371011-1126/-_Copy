<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禪定日誌與進度</title>
    <style>
        :root {
            --bg-color: #F7F9FA;
            --white: #FFFFFF;
            --primary-green: #3E8E7E;
            --light-green-bg: #F0FDF4;
            --text-dark: #374151;
            --text-gray: #8CA3A7;
            --text-light-gray: #9CA3AF;
            --purple-main: #8B5CF6;
            --purple-light: #F3E8FF;
            --orange-main: #F57C00;
            --orange-light: #FFF3E0;
            --gray-pill: #F3F4F6;
            --input-bg: #F9FAFB;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

        body {
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            color: var(--text-dark);
        }

        .app-container { width: 100%; max-width: 480px; min-height: 100vh; padding: 20px; padding-bottom: 40px;}

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .heart-icon {
            width: 48px; height: 48px; background-color: var(--primary-green); border-radius: 16px;
            display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 12px rgba(62,142,126,0.2);
        }
        .header-text h1 { margin: 0; font-size: 18px; font-weight: 700; }
        .header-text p { margin: 2px 0 0; font-size: 13px; color: var(--primary-green); font-weight: 600; }
        .header-right { text-align: right; }
        .header-right .points { margin: 0; font-size: 28px; font-weight: 800; color: var(--primary-green); line-height: 1; }
        .header-right .subtitle { margin: 4px 0 0; font-size: 12px; color: var(--text-gray); font-weight: 600; }
        
        .progress-bar-bg { width: 100%; height: 6px; background-color: #E5E7EB; border-radius: 3px; margin-top: 15px; overflow: hidden; }
        .progress-bar-fill { width: 36%; height: 100%; background-color: var(--primary-green); border-radius: 3px; }

        /* Quote Card */
        .quote-card {
            background: var(--white); border-radius: 24px; padding: 24px 20px; margin-top: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02); text-align: center; border: 1px solid #F3F4F6;
        }
        .quote-text { font-size: 15px; line-height: 1.8; color: var(--text-dark); font-style: italic; font-weight: 600; letter-spacing: 0.5px; }
        .quote-author { display: flex; align-items: center; justify-content: flex-end; margin-top: 15px; font-size: 12px; color: var(--primary-green); font-weight: bold; }
        .quote-author::before { content: ""; width: 30px; height: 1px; background-color: #A7F3D0; margin-right: 10px; }

        /* Tabs */
        .tabs-wrapper { display: flex; background-color: var(--gray-pill); border-radius: 16px; padding: 4px; margin: 20px 0; }
        .tab { flex: 1; text-align: center; padding: 12px 0; border-radius: 12px; font-size: 14px; font-weight: bold; color: var(--text-gray); cursor: pointer; transition: all 0.2s; }
        .tab.active { background-color: var(--white); color: var(--primary-green); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

        /* Tab Content Areas */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Form Styling */
        .form-card { background: var(--white); border-radius: 24px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); margin-bottom: 20px; }
        .form-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin: 0 0 20px 0; }
        .input-group { background: var(--input-bg); border-radius: 12px; display: flex; align-items: center; padding: 14px 16px; margin-bottom: 12px; border: 1px solid transparent; transition: border 0.2s; }
        .input-group:focus-within { border: 1px solid #D1D5DB; }
        .input-group input, .input-group select, .input-group textarea { border: none; background: transparent; width: 100%; font-size: 15px; color: var(--text-dark); outline: none; font-weight: 600; appearance: none; -webkit-appearance: none; }
        .input-group input::placeholder, .input-group textarea::placeholder { color: var(--text-light-gray); font-weight: 500; }
        .input-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .input-row .input-group { margin-bottom: 0; flex: 1; }
        textarea { resize: none; height: 100px; line-height: 1.5; margin-top: 5px; }
        .btn-submit {
            width: 100%; background: #F3F4F6; color: #9CA3AF; border: none; padding: 16px; border-radius: 12px;
            font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.2s; margin-top: 10px;
        }
        .btn-submit.active { background: var(--primary-green); color: white; box-shadow: 0 4px 15px rgba(62,142,126,0.3); }

        /* Record Cards */
        .list-header { font-size: 14px; font-weight: bold; color: var(--text-gray); margin: 20px 0 15px 5px; }
        .record-card { background: var(--white); border-radius: 24px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); margin-bottom: 16px; position: relative; overflow: hidden; }
        .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        
        .avatar-box { width: 44px; height: 44px; border-radius: 14px; display: flex; justify-content: center; align-items: center; flex-shrink: 0;}
        .avatar-box.personal { background-color: #F9F5FF; }
        .avatar-box.partner { background-color: #EFF6FF; }
        
        .card-info { margin-left: 12px; flex: 1; }
        .card-name { font-size: 15px; font-weight: bold; color: var(--text-dark); }
        
        .status-badge { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: bold; }
        .status-badge.purple { color: var(--purple-main); }
        .status-badge.orange { color: var(--orange-main); }
        .status-badge.gray { color: var(--text-light-gray); }
        
        .personal-ribbon { position: absolute; top: 0; right: 20px; color: white; padding: 6px 12px; border-radius: 0 0 12px 12px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .personal-ribbon.purple { background: var(--purple-main); }
        .personal-ribbon.orange { background: var(--orange-main); }

        .tags { display: flex; gap: 8px; margin: 12px 0 15px 0; }
        .tag { padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; }
        .tag-duration.purple { background: var(--purple-light); color: var(--purple-main); }
        .tag-duration.orange { background: var(--orange-light); color: var(--orange-main); }
        .tag-duration.default { background: var(--gray-pill); color: var(--text-gray); }
        .tag-chakra { background: var(--gray-pill); color: var(--text-gray); }

        .reflection-text { font-size: 15px; line-height: 1.6; color: var(--text-dark); font-style: italic; }

        .loading { text-align: center; color: var(--text-gray); padding: 40px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="header">
        <div class="header-left">
            <div class="heart-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
            </div>
            <div class="header-text">
                <h1>階段 4：身心舒坦</h1>
                <p>目前禪定狀態</p>
            </div>
        </div>
        <div class="header-right">
            <h2 class="points">12</h2>
            <p class="subtitle">/ 33 能量累積</p>
        </div>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill"></div></div>

    <div class="quote-card">
        <div class="quote-text">「禪令忙碌的人找到寧靜，禪令痛苦的人解脫煩惱，禪令快樂的人獲得智慧，禪令不平凡的人，明瞭平凡的真諦。」</div>
        <div class="quote-author">禪宗第 85 代宗師 悟覺妙天禪師</div>
    </div>

    <div class="tabs-wrapper">
        <div class="tab active" onclick="switchTab('today')" id="btn-today">今日紀錄</div>
        <div class="tab" onclick="switchTab('progress')" id="btn-progress">成長進度</div>
        <div class="tab" onclick="switchTab('partner')" id="btn-partner">夥伴心得</div>
    </div>

    <div id="tab-today" class="tab-content active">
        <div class="form-card">
            <div class="form-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3E8E7E" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                紀錄您的禪定
            </div>
            
            <div class="input-group">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2" style="margin-right:10px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <input type="text" id="input-name" placeholder="我是誰？(姓名)" oninput="checkForm()">
            </div>
            
            <div class="input-group">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2" style="margin-right:10px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <input type="date" id="input-date" style="color: #374151;" oninput="checkForm()">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <input type="number" id="input-duration" placeholder="禪定多久？" oninput="checkForm()">
                    <span style="color:#9CA3AF; font-size:13px; font-weight:bold; white-space:nowrap;">分鐘</span>
                </div>
                <div class="input-group">
                    <select id="input-chakra" onchange="checkForm()">
                        <option value="" disabled selected>練習脈輪/方法</option>
                        <option value="腹式呼吸">腹式呼吸</option>
                        <option value="名色 脈輪">名色 脈輪</option>
                        <option value="無始 脈輪">無始 脈輪</option>
                        <option value="無明 脈輪">無明 脈輪</option>
                        <option value="吉祥 脈輪">吉祥 脈輪</option>
                        <option value="如意 脈輪">如意 脈輪</option>
                        <option value="明心 脈輪">明心 脈輪</option>
                        <option value="二空 脈輪">二空 脈輪</option>
                        <option value="智慧 脈輪">智慧 脈輪</option>
                        <option value="法眼 脈輪">法眼 脈輪</option>
                        <option value="禪心 脈輪">禪心 脈輪</option>
                    
                    </select>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="3" style="margin-left:5px;"><path d="M6 9l6 6 6-6"></path></svg>
                </div>
            </div>

            <div class="input-group" style="align-items: flex-start;">
                <textarea id="input-reflection" placeholder="寫下您的心得發現..." oninput="checkForm()"></textarea>
            </div>

            <button id="submit-btn" class="btn-submit" onclick="saveRecord()" disabled>送出禪定紀錄</button>
        </div>

        <div class="list-header" id="my-records-title" style="display:none;">您的禪定日誌</div>
        <div id="my-records-container"></div>
    </div>

    <div id="tab-progress" class="tab-content">
        <div class="loading">功能載入中...</div>
    </div>

    <div id="tab-partner" class="tab-content">
        <div class="list-header">夥伴們的心得</div>
        <div id="partner-records-container">
            <div class="loading">正在從雲端讀取紀錄...</div>
        </div>
    </div>

</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx6L86517PkUKKn3U1WfXTIt3D32VyR94nQ2_l-qC9Jc7W1jZleQ9gf7v_Rotvm-V3C/exec";
    let allRecords = [];

    function formatDateSimple(dateStr) {
        if (!dateStr) return "";
        return dateStr.includes('T') ? dateStr.split('T')[0] : dateStr;
    }

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('input-date').value = today;
        const savedName = localStorage.getItem('zen_user_name');
        if(savedName) document.getElementById('input-name').value = savedName;
        fetchData();
    };

    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-' + tabId).classList.add('active');
        document.getElementById('tab-' + tabId).classList.add('active');
    }

    function checkForm() {
        const name = document.getElementById('input-name').value.trim();
        const date = document.getElementById('input-date').value;
        const duration = document.getElementById('input-duration').value;
        const chakra = document.getElementById('input-chakra').value;
        const reflection = document.getElementById('input-reflection').value.trim();
        const btn = document.getElementById('submit-btn');

        if(name && date && duration && chakra && reflection) {
            btn.disabled = false;
            btn.classList.add('active');
        } else {
            btn.disabled = true;
            btn.classList.remove('active');
        }
    }

    function calculateType(duration) {
        if(duration >= 60) return "極致禪定 (2.0x)";
        if(duration >= 40) return "深度禪定 (1.5x)";
        return "一般禪定";
    }

    async function saveRecord() {
        const btn = document.getElementById('submit-btn');
        btn.innerText = "🚀 送出中...";
        btn.disabled = true;

        const name = document.getElementById('input-name').value.trim();
        const duration = parseInt(document.getElementById('input-duration').value);
        localStorage.setItem('zen_user_name', name);

        const newRecord = {
            name: name,
            id: Date.now(),
            date: document.getElementById('input-date').value,
            duration: duration,
            chakra: document.getElementById('input-chakra').value,
            type: calculateType(duration),
            reflection: document.getElementById('input-reflection').value.trim()
        };

        try {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(newRecord) });
            document.getElementById('input-duration').value = "";
            document.getElementById('input-chakra').value = "";
            document.getElementById('input-reflection').value = "";
            checkForm();
            await fetchData();
            alert("紀錄成功！能量已累積！");
        } catch(e) {
            alert("連線異常，請稍後再試。");
            btn.innerText = "送出禪定紀錄";
            checkForm();
        }
    }

    async function fetchData() {
        try {
            const response = await fetch(GAS_URL);
            allRecords = await response.json();
            allRecords.sort((a, b) => new Date(b.date) - new Date(a.date));
            renderPartnerRecords();
            renderMyRecords();
        } catch(e) {
            document.getElementById('partner-records-container').innerHTML = `<div class="loading">讀取失敗。</div>`;
        }
    }

    function renderPartnerRecords() {
        const container = document.getElementById('partner-records-container');
        container.innerHTML = "";
        
        allRecords.forEach(rec => {
            const dur = parseInt(rec.duration);
            const cleanDate = formatDateSimple(rec.date);
            let badgeHtml = `<div class="status-badge gray">${cleanDate}</div>`;
            let tagClass = "default";

            if (dur >= 60) {
                badgeHtml = `<div class="status-badge purple">👑 ${cleanDate}</div>`;
                tagClass = "purple";
            } else if (dur >= 40) {
                badgeHtml = `<div class="status-badge orange">⚡ ${cleanDate}</div>`;
                tagClass = "orange";
            }

            container.innerHTML += `
                <div class="record-card">
                    <div class="card-top">
                        <div style="display:flex; align-items:center;">
                            <div class="avatar-box partner">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4A90E2" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            </div>
                            <div class="card-info"><div class="card-name">${rec.name || '夥伴'}</div></div>
                        </div>
                        ${badgeHtml}
                    </div>
                    <div class="tags">
                        <div class="tag tag-duration ${tagClass}">${rec.duration} 分鐘</div>
                        <div class="tag tag-chakra">${rec.chakra}</div>
                    </div>
                    <div class="reflection-text">"${rec.reflection}"</div>
                </div>`;
        });
    }

    function renderMyRecords() {
        const container = document.getElementById('my-records-container');
        const title = document.getElementById('my-records-title');
        const currentName = localStorage.getItem('zen_user_name');
        container.innerHTML = "";
        if(!currentName) { title.style.display = 'none'; return; }

        const myData = allRecords.filter(r => r.name === currentName);
        title.style.display = myData.length > 0 ? 'block' : 'none';

        myData.forEach(rec => {
            const dur = parseInt(rec.duration);
            const cleanDate = formatDateSimple(rec.date);
            let ribbon = "";
            let tagClass = "default";

            if (dur >= 60) {
                ribbon = `<div class="personal-ribbon purple">👑 極致 2.0x</div>`;
                tagClass = "purple";
            } else if (dur >= 40) {
                ribbon = `<div class="personal-ribbon orange">⚡ 深度 1.5x</div>`;
                tagClass = "orange";
            }

            container.innerHTML += `
                <div class="record-card" style="padding-top: ${ribbon ? '35px' : '20px'};">
                    ${ribbon}
                    <div class="card-top">
                        <div style="display:flex;">
                            <div class="avatar-box personal">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--purple-main)" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                            </div>
                            <div class="card-info">
                                <div class="card-name">${cleanDate}</div>
                                <div class="tags" style="margin: 6px 0 0 0;">
                                    <div class="tag tag-duration ${tagClass}">${rec.duration} 分鐘</div>
                                    <div class="tag tag-chakra">${rec.chakra}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="reflection-text" style="margin-top:15px;">"${rec.reflection}"</div>
                </div>`;
        });
    }
</script>
</body>
</html>
