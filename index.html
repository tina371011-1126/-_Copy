<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100天禪定打卡計畫</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFFFFF; color: #334155; -webkit-tap-highlight-color: transparent; }
        .nav-shadow { box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .transition-all { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useCallback } = React;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbz0U7O7f6Z44Ep6EQbSJEuXqJIw-wfvJZHw5IFSWyjMFtQsavZUCmf4vIVlTjHiuS4b/exec";
        const GOOGLE_CLIENT_ID = "898764620568-6h1uavirukt1k1vpfpvmfdbge74823vm.apps.googleusercontent.com";
        const CHAKRAS = ["腹式呼吸", "名色 脈輪", "無始 脈輪", "無明 脈輪", "吉祥 脈輪", "如意 脈輪", "明心 脈輪", "二空 脈輪", "智慧 脈輪", "法眼 脈輪", "禪心 脈輪"];

        const durationColor = (min) => {
            const m = Number(min);
            if (m >= 60) return 'bg-purple-500 text-white';
            if (m >= 40) return 'bg-orange-400 text-white';
            return 'bg-emerald-500 text-white';
        };

        const Icon = ({ name, className = "" }) => {
            const icons = {
                Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                Trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55-.47.98-.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>,
                Plus: <><path d="M12 5v14M5 12h14"/></>,
                Book: <><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/></>,
                Users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                ChevronLeft: <><path d="m15 18-6-6 6-6"/></>,
                ChevronRight: <><path d="m9 18 6-6-9-6"/></>,
                Trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10"/>}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('zenUser_v2')) || null);
            const [view, setView] = useState('home');
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [selectedDateRecords, setSelectedDateRecords] = useState(null);
            const [calDate, setCalDate] = useState(new Date());
            const [searchTerm, setSearchTerm] = useState('');
            const [filterChakra, setFilterChakra] = useState('');
            const [currentPage, setCurrentPage] = useState(1);
            const ITEMS_PER_PAGE = 10;

            const [formData, setFormData] = useState({
                customName: user?.name || '', 
                duration: '', reflection: '', focusChakra: '腹式呼吸',
                practiceDate: new Date().toISOString().split('T')[0]
            });

            const fetchLogs = useCallback(async () => {
                try {
                    const res = await fetch(GAS_URL);
                    const data = await res.json();
                    setLogs(Array.isArray(data) ? data : []);
                } catch (e) {
                    console.error('fetchLogs error:', e);
                } finally {
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                fetchLogs();
                window.handleGoogleLogin = (response) => {
                    const base64 = response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                    const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                    const payload = JSON.parse(jsonPayload);
                    const loggedInUser = { email: payload.email, name: payload.name };
                    setUser(loggedInUser);
                    setFormData(prev => ({ ...prev, customName: loggedInUser.name }));
                    localStorage.setItem('zenUser_v2', JSON.stringify(loggedInUser));
                };
            }, [fetchLogs]);

            useEffect(() => {
                if (!user) {
                    const timer = setInterval(() => {
                        if (window.google?.accounts?.id && document.getElementById("google-login-btn")) {
                            window.google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: window.handleGoogleLogin });
                            window.google.accounts.id.renderButton(document.getElementById("google-login-btn"), { theme: "outline", size: "large", width: "250" });
                            clearInterval(timer);
                        }
                    }, 100);
                    return () => clearInterval(timer);
                }
            }, [user]);

            const deleteLog = async (log) => {
                if (!window.confirm("確定要刪除這筆紀錄嗎？此動作無法復原。")) return;
                setLogs(prev => prev.filter(l => 
                    !(l.email === log.email && l.date === log.date && l.duration === log.duration && l.reflection === log.reflection)
                ));
                if (selectedDateRecords) {
                    setSelectedDateRecords(prev => ({
                        ...prev,
                        logs: prev.logs.filter(l => !(l.date === log.date && l.duration === log.duration))
                    }));
                }
                try {
                    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ ...log, action: 'delete' }) });
                } catch (e) { 
                    console.error("Delete failed:", e); 
                    fetchLogs();
                }
            };

            // 我的日誌：日期新到舊排序
            const myLogs = useMemo(() =>
                logs.filter(l => l && l.email === user?.email)
                    .sort((a, b) => b.date.localeCompare(a.date))
            , [logs, user]);

            const stats = useMemo(() => {
                const dates = [...new Set(myLogs.map(l => l.date))].sort().reverse();
                if (dates.length === 0) return { total: 0, streak: 0 };
                let maxStreak = 0, currentStreak = 1;
                for (let i = 0; i < dates.length - 1; i++) {
                    const diff = (new Date(dates[i]) - new Date(dates[i+1])) / (86400000);
                    if (diff === 1) currentStreak++;
                    else { maxStreak = Math.max(maxStreak, currentStreak); currentStreak = 1; }
                }
                return { total: dates.length, streak: Math.max(maxStreak, currentStreak) };
            }, [myLogs]);

            const calendarData = useMemo(() => {
                const year = calDate.getFullYear();
                const month = calDate.getMonth();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const map = {};
                myLogs.forEach(l => {
                    const d = new Date(l.date);
                    if (d.getFullYear() === year && d.getMonth() === month) {
                        const day = d.getDate();
                        if (!map[day]) map[day] = [];
                        map[day].push(l);
                    }
                });
                return { daysInMonth, map, year, month: month + 1 };
            }, [myLogs, calDate]);

            const filteredLogs = useMemo(() => logs
                .filter(l => 
                    l && (searchTerm === '' || (l.name || '').includes(searchTerm)) &&
                    (filterChakra === '' || l.chakra === filterChakra)
                )
                .sort((a, b) => b.date.localeCompare(a.date))
            , [logs, searchTerm, filterChakra]);
            // --- 新增以下這段區塊 (放在 filteredLogs 後面) ---
            // 1. 計算總頁數
            const totalPages = Math.ceil(filteredLogs.length / ITEMS_PER_PAGE);
            
            // 2. 切割出當前頁面要顯示的 10 筆資料
            const paginatedLogs = useMemo(() => {
                const start = (currentPage - 1) * ITEMS_PER_PAGE;
                return filteredLogs.slice(start, start + ITEMS_PER_PAGE);
            }, [filteredLogs, currentPage]);
            
            // 3. 當搜尋條件改變時，自動回到第一頁
            useEffect(() => {
                setCurrentPage(1);
            }, [searchTerm, filterChakra]);
            // ---------------------------------------------
            const isFormValid = formData.practiceDate && formData.duration && formData.reflection.trim() && formData.customName.trim();

            if (!user) return (
                <div className="flex flex-col items-center justify-center h-screen bg-white p-10 text-center">
                    <div className="mb-8">
                        <h1 className="text-4xl font-black text-emerald-600 mb-2">100天禪定打卡</h1>
                        <p className="text-slate-400 text-sm">請先登入 Google 帳號以開始紀錄</p>
                    </div>
                    <div id="google-login-btn" className="min-h-[40px]"></div>
                </div>
            );

            if (loading && logs.length === 0) return (
                <div className="flex h-screen items-center justify-center text-emerald-600 font-bold">同步紀錄中...</div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white pb-24">
                    <header className="p-6 pt-10 text-center border-b border-slate-50">
                        <p className="text-xs font-medium text-slate-500 mb-2">「禪令忙碌的人找到寧靜，禪令痛苦的人解脫煩惱，禪令快樂的人獲得智慧，禪令不平凡的人，明瞭平凡的真諦。」</p>
                        <p className="text-[10px] text-emerald-600 font-bold">禪宗第 85 代宗師 悟覺妙天禪師</p>
                    </header>

                    <main className="p-5">
                        {view === 'home' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black">你好, {user.name}</h2>
                                    <button onClick={() => {setUser(null); localStorage.removeItem('zenUser_v2');}} className="text-slate-300 text-xs font-bold">登出</button>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-[2rem]">
                                    <div className="flex justify-between items-center mb-4">
                                        <button onClick={() => setCalDate(new Date(calDate.setMonth(calDate.getMonth() - 1)))} className="p-2 text-slate-400"><Icon name="ChevronLeft" /></button>
                                        <h3 className="font-bold text-slate-700">{calendarData.year}年 {calendarData.month}月</h3>
                                        <button onClick={() => setCalDate(new Date(calDate.setMonth(calDate.getMonth() + 1)))} className="p-2 text-slate-400"><Icon name="ChevronRight" /></button>
                                    </div>
                                    <div className="grid grid-cols-7 gap-2">
                                        {Array.from({length: calendarData.daysInMonth}).map((_, i) => {
                                            const day = i + 1;
                                            const dayLogs = calendarData.map[day] || [];
                                            const hasLog = dayLogs.length > 0;
                                            const maxDur = hasLog ? Math.max(...dayLogs.map(l => Number(l.duration))) : 0;
                                            return (
                                                <div key={i} onClick={() => setSelectedDateRecords({ day, logs: dayLogs })}
                                                    className={`aspect-square flex items-center justify-center rounded-full text-[10px] font-bold cursor-pointer transition-all active:scale-90 ${hasLog ? durationColor(maxDur) : 'bg-white text-slate-200 shadow-sm'}`}>
                                                    {day}
                                                </div>
                                            );
                                        })}
                                    </div>
                                    
                                    {selectedDateRecords && (
                                        <div className="mt-6 p-4 bg-white rounded-2xl border border-emerald-100 shadow-sm transition-all">
                                            <div className="flex justify-between items-center mb-2">
                                                {/* 修正：顯示 月份與日期 */}
                                                <h4 className="font-bold text-emerald-700">{calendarData.month} 月 {selectedDateRecords.day} 日紀錄</h4>
                                                <button onClick={() => setSelectedDateRecords(null)} className="text-slate-300 text-xs">關閉</button>
                                            </div>
                                            {selectedDateRecords.logs.length > 0 ? selectedDateRecords.logs.map((l, idx) => (
                                                <div key={idx} className="flex justify-between items-center py-2 border-b border-slate-50 last:border-0">
                                                    <span className="text-xs font-bold text-slate-600">⚡ {l.duration}min - {l.chakra}</span>
                                                    <button onClick={() => deleteLog(l)} className="p-1 text-slate-300 hover:text-red-400"><Icon name="Trash" className="w-4 h-4" /></button>
                                                </div>
                                            )) : <p className="text-xs text-slate-400">當日尚無紀錄</p>}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'progress' && (
                            <div className="space-y-6">
                                <h2 className="text-xl font-black text-emerald-700">成長進度</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-emerald-50 p-5 rounded-3xl text-center">
                                        <p className="text-xs text-emerald-600 font-bold">累積天數</p>
                                        <p className="text-3xl font-black text-emerald-700">{stats.total}</p>
                                    </div>
                                    <div className="bg-orange-50 p-5 rounded-3xl text-center">
                                        <p className="text-xs text-orange-600 font-bold">最高連續天數</p>
                                        <p className="text-3xl font-black text-orange-700">{stats.streak}天</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'record' && (
                            <div className="space-y-4">
                                <h2 className="text-xl font-black">紀錄你的禪定心得</h2>
                                <input type="text" placeholder="顯示名稱" className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold" value={formData.customName} onChange={e=>setFormData({...formData, customName:e.target.value})} />
                                <input type="date" className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold" value={formData.practiceDate} onChange={e=>setFormData({...formData, practiceDate:e.target.value})} />
                                <input type="number" placeholder="時長 (分鐘)" className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold" value={formData.duration} onChange={e=>setFormData({...formData, duration:e.target.value})} />
                                <select className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold" value={formData.focusChakra} onChange={e=>setFormData({...formData, focusChakra:e.target.value})}>
                                    {CHAKRAS.map(c=><option key={c} value={c}>{c}</option>)}
                                </select>
                                <textarea placeholder="今日心得..." className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold min-h-[120px]" value={formData.reflection} onChange={e=>setFormData({...formData, reflection:e.target.value})} />
                                
                                {/* 修正：按鈕顏色根據時長變動 */}
                                <button disabled={!isFormValid || isSubmitting} onClick={async () => {
                                        setIsSubmitting(true);
                                        const newLog = { email: user.email, name: formData.customName, date: formData.practiceDate, duration: formData.duration, chakra: formData.focusChakra, reflection: formData.reflection };
                                        setLogs(prev => [newLog, ...prev]);
                                        setView('personal');
                                        try {
                                            await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ ...newLog, action: 'add' }) });
                                            setFormData(prev => ({ ...prev, duration: '', reflection: '', practiceDate: new Date().toISOString().split('T')[0] }));
                                            setTimeout(fetchLogs, 1000);
                                        } catch(e) { 
                                            console.error(e); 
                                            fetchLogs();
                                        }
                                        setIsSubmitting(false);
                                    }}
                                    className={`w-full py-5 rounded-3xl font-black text-white transition-all 
                                        ${!isFormValid || isSubmitting ? 'bg-slate-200' : 
                                          Number(formData.duration) >= 60 ? 'bg-purple-500' :
                                          Number(formData.duration) >= 40 ? 'bg-orange-400' : 'bg-emerald-600'} 
                                        active:scale-95`}>
                                    {isSubmitting ? '同步中...' : '送出紀錄'}
                                </button>
                            </div>
                        )}

                        {view === 'personal' && (
                            <div className="space-y-4">
                                <h2 className="text-xl font-black">我的禪定日誌</h2>
                                {myLogs.length > 0 ? myLogs.map((log, i) => (
                                    <div key={i} className="bg-slate-50 p-4 rounded-2xl transition-all">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <p className="text-[10px] font-bold text-emerald-600">{log.date}</p>
                                                <p className="font-bold">{log.duration}min · {log.chakra}</p>
                                            </div>
                                            <button onClick={() => deleteLog(log)} className="p-2 text-slate-300 hover:text-red-400 transition-colors"><Icon name="Trash" /></button>
                                        </div>
                                        <p className="text-xs text-slate-500 mt-2 italic">「{log.reflection}」</p>
                                    </div>
                                )) : <p className="text-center text-slate-300 py-10">尚無紀錄</p>}
                            </div>
                        )}

                        {view === 'partners' && (
                            <div className="space-y-4">
                                <h2 className="text-xl font-black">夥伴心得查詢</h2>
                                <div className="flex flex-col gap-2">
                                    <input placeholder="搜尋人名..." className="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" onChange={e=>setSearchTerm(e.target.value)} />
                                    <select className="w-full p-3 bg-slate-50 rounded-xl text-xs font-bold" value={filterChakra} onChange={e=>setFilterChakra(e.target.value)}>
                                        <option value="">所有脈輪</option>
                                        {CHAKRAS.map(c=><option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-3">
                                    {paginatedLogs.map((log, i) => (
                                            <div key={i} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                            <div className="flex justify-between items-center text-sm font-bold">
                                                <span>{log.name} {Number(log.duration) >= 60 ? '👑' : ''}</span>
                                                <span className="text-[10px] text-slate-400">{log.date}</span>
                                            </div>
                                            <p className="text-xs text-slate-500">{log.duration}min · {log.chakra}</p>
                                            <p className="text-xs text-slate-600 bg-slate-50 p-2 rounded-xl mt-2 italic">「{log.reflection}」</p>
                                        </div>
                                    ))}
                                    {filteredLogs.length === 0 && <p className="text-center text-slate-300 py-8">找尋不到符合條件的紀錄</p>}
                                    {/* --- 新增以下這段：分頁按鈕區塊 (只有總頁數大於1時才顯示) --- */}
{totalPages > 1 && (
    <div className="flex justify-between items-center mt-6 pt-4 border-t border-slate-100 pb-4">
        <button
            disabled={currentPage === 1}
            onClick={() => setCurrentPage(p => Math.max(1, p - 1))}
            className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${currentPage === 1 ? 'bg-slate-50 text-slate-300' : 'bg-emerald-50 text-emerald-600 active:scale-95'}`}
        >
            上一頁
        </button>
        <span className="text-xs font-bold text-slate-400">
            {currentPage} / {totalPages}
        </span>
        <button
            disabled={currentPage === totalPages}
            onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))}
            className={`px-4 py-2 rounded-xl text-xs font-bold transition-all ${currentPage === totalPages ? 'bg-slate-50 text-slate-300' : 'bg-emerald-50 text-emerald-600 active:scale-95'}`}
        >
            下一頁
        </button>
    </div>
)}
{/* ----------------------------------------------------- */}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-md rounded-[2.5rem] p-2 flex justify-around items-center nav-shadow border border-slate-100">
                        {[{id:'home', icon:'Home'}, {id:'progress', icon:'Trophy'}, {id:'record', icon:'Plus'}, {id:'personal', icon:'Book'}, {id:'partners', icon:'Users'}].map(item => (
                            <button key={item.id} onClick={()=>setView(item.id)} className={`p-4 rounded-full transition-all ${view===item.id?'bg-emerald-600 text-white shadow-lg scale-110': 'text-slate-300 hover:text-emerald-300'}`}>
                                <Icon name={item.icon} />
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
