<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100天禪定打卡計畫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        // 必須從全域變數 React 中提取功能
        const { useState, useEffect, useMemo } = React;

        // --- 修正後的設定區 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbylgmrDktw1X5h2d7gRiLZirQSDQLJF2N-WlsmB3eyEwAYsAqhQ9m0YF29T_ImGLDAT/exec";
        // 修正：已移除 ID 中間的空格
        const GOOGLE_CLIENT_ID = "898764620568-6h1uavirukt1k1vpfomfdbge74823vm.apps.googleusercontent.com";

        const CHAKRAS = ["腹式呼吸", "名色", "無始", "無明", "吉祥", "如意", "明心", "二空", "智慧", "法眼", "禪心"];
        
        const ZEN_LEVELS = [
            { stage: 1, threshold: 1, name: "靜心起步", iconName: "Sunrise" },
            { stage: 2, threshold: 4, name: "呼吸自在", iconName: "Wind" },
            { stage: 3, threshold: 8, name: "專注當下", iconName: "Smile" },
            { stage: 10, threshold: 33, name: "圓滿自在", iconName: "Crown" },
        ];

        // 圖標渲染修正版
        const Icon = ({ name, size = 20, className = "" }) => {
            const LucideIcon = window.lucide[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        // 重要：解決 React Error #130，強制轉化所有資料為字串
        const safeText = (val) => (val === null || val === undefined) ? "" : String(val);

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('mine');
            const [globalLogs, setGlobalLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [formData, setFormData] = useState({
                duration: '', reflection: '', focusChakra: '腹式呼吸', 
                practiceDate: new Date().toISOString().split('T')[0]
            });

            // 初始化 Google 登入
            useEffect(() => {
                window.handleGoogleLogin = (response) => {
                    const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                    const loggedInUser = { email: payload.email, name: payload.name };
                    setUser(loggedInUser);
                    localStorage.setItem('zenUser', JSON.stringify(loggedInUser));
                };

                const savedUser = localStorage.getItem('zenUser');
                if (savedUser) setUser(JSON.parse(savedUser));
                fetchGASData();
            }, []);

            const fetchGASData = async () => {
                try {
                    const res = await fetch(GAS_URL);
                    const data = await res.json();
                    // 資料清洗，確保不包含物件以免崩潰
                    setGlobalLogs(data.map(r => ({
                        email: safeText(r.Email || r.email),
                        name: safeText(r.Name || r.name || "無名"),
                        date: safeText(r.Date || r.date).split('T')[0],
                        duration: parseInt(r.Duration || r.duration || 0),
                        chakra: safeText(r.Chakra || r.chakra),
                        reflection: safeText(r.Reflection || r.reflection)
                    })));
                } catch (e) { console.error("抓取失敗", e); }
                setLoading(false);
            };

            const myLogs = useMemo(() => user ? globalLogs.filter(l => l.email === user.email) : [], [user, globalLogs]);

            const handleSubmit = async () => {
                if (!user || isSubmitting) return;
                setIsSubmitting(true);
                const payload = { ...formData, email: user.email, name: user.name };
                try {
                    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setFormData({ ...formData, duration: '', reflection: '' });
                    alert("同步完成！");
                    fetchGASData();
                } catch (e) { alert("發送失敗"); }
                setIsSubmitting(false);
            };

            if (loading) return <div className="flex h-screen items-center justify-center text-slate-400">系統啟動中...</div>;

            if (!user) return (
                <div className="flex flex-col items-center justify-center h-screen">
                    <h1 className="text-2xl font-black mb-6">禪定打卡計畫</h1>
                    <div id="g_id_onload" data-client_id={GOOGLE_CLIENT_ID} data-callback="handleGoogleLogin"></div>
                    <div className="g_id_signin" data-type="standard"></div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto p-4">
                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-emerald-100 mb-6">
                        <div className="flex justify-between items-center">
                            <h2 className="font-black text-emerald-600">您好，{user.name}</h2>
                            <span className="text-xs font-bold text-slate-400">累計 {myLogs.length} 次紀錄</span>
                        </div>
                    </div>

                    <div className="flex bg-white p-1 rounded-2xl mb-6 shadow-sm">
                        <button onClick={() => setView('mine')} className={`flex-1 py-3 rounded-xl text-sm font-bold ${view==='mine'?'bg-emerald-600 text-white':'text-slate-400'}`}>打卡</button>
                        <button onClick={() => setView('global')} className={`flex-1 py-3 rounded-xl text-sm font-bold ${view==='global'?'bg-emerald-600 text-white':'text-slate-400'}`}>夥伴</button>
                    </div>

                    {view === 'mine' ? (
                        <div className="space-y-4">
                            <input type="number" placeholder="時長 (min)" className="w-full p-4 bg-white rounded-2xl border" value={formData.duration} onChange={e=>setFormData({...formData, duration:e.target.value})} />
                            <textarea placeholder="今日心得..." className="w-full p-4 bg-white rounded-2xl border min-h-[100px]" value={formData.reflection} onChange={e=>setFormData({...formData, reflection:e.target.value})} />
                            <button onClick={handleSubmit} className="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black">同步紀錄</button>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {globalLogs.map((log, i) => (
                                <div key={i} className="bg-white p-4 rounded-2xl border border-slate-100">
                                    <div className="flex justify-between text-[10px] font-bold text-slate-400">
                                        <span>{log.name}</span>
                                        <span>{log.date}</span>
                                    </div>
                                    <p className="text-sm font-bold text-slate-700 mt-1">{log.duration} 分鐘 · {log.chakra}</p>
                                    <p className="text-xs text-slate-500 italic mt-1">「{log.reflection}」</p>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
