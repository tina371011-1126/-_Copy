<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100天禪定打卡計畫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFFFFF; margin: 0; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .nav-shadow { box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.05); }
        input:focus, textarea:focus, select:focus { outline: 2px solid #10B981; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbylgmrDktw1X5h2d7gRiLZirQSDQLJF2N-WlsmB3eyEwAYsAqhQ9m0YF29T_ImGLDAT/exec";
        const GOOGLE_CLIENT_ID = "898764620568-6h1uavirukt1k1vpfomfdbge74823vm.apps.googleusercontent.com";
        const CHAKRAS = ["腹式呼吸", "名色", "無始", "無明", "吉祥", "如意", "明心", "二空", "智慧", "法眼", "禪心"];
        
        // 修正後的 Icon 元件，使用 Fragment 包裹解決 Adjacent JSX 錯誤
        const Icon = ({ name, className = "" }) => {
            const icons = {
                Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                Trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>,
                Plus: <><path d="M5 12h14"/><path d="M12 5v14"/></>,
                Book: <><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>,
                Users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                LogOut: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
                Edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                Trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10"/>}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            const [globalLogs, setGlobalLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [currentPage, setCurrentPage] = useState(1);
            
            const [formData, setFormData] = useState({
                duration: '', reflection: '', focusChakra: '腹式呼吸', 
                practiceDate: new Date().toISOString().split('T')[0],
                id: null // 用於編輯
            });

            const [searchTerm, setSearchTerm] = useState('');
            const [filterChakra, setFilterChakra] = useState('全部');

            useEffect(() => {
                window.handleGoogleLogin = (response) => {
                    const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                    const loggedInUser = { email: payload.email, name: payload.name };
                    setUser(loggedInUser);
                    localStorage.setItem('zenUser', JSON.stringify(loggedInUser));
                };

                const savedUser = localStorage.getItem('zenUser');
                if (savedUser) setUser(JSON.parse(savedUser));
                fetchGASData();
            }, []);

            const fetchGASData = async () => {
                try {
                    const res = await fetch(GAS_URL);
                    const data = await res.json();
                    setGlobalLogs(data || []);
                } catch (e) { console.error(e); } finally { setLoading(false); }
            };

            const myLogs = useMemo(() => user ? globalLogs.filter(l => l.email === user.email) : [], [user, globalLogs]);
            
            // 計算連續天數
            const streaks = useMemo(() => {
                if (myLogs.length === 0) return 0;
                const dates = [...new Set(myLogs.map(l => l.date))].sort().reverse();
                let count = 0;
                let today = new Date();
                today.setHours(0,0,0,0);
                
                for(let i=0; i<dates.length; i++) {
                    let d = new Date(dates[i]);
                    let diff = (today - d) / (1000*60*60*24);
                    if (diff <= count) count++; else break;
                }
                return count;
            }, [myLogs]);

            const handleSubmit = async () => {
                if (!user || isSubmitting) return;
                setIsSubmitting(true);
                const payload = { ...formData, email: user.email, name: user.name, action: formData.id ? 'UPDATE' : 'INSERT' };
                try {
                    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    alert("同步完成！");
                    setFormData({ duration: '', reflection: '', focusChakra: '腹式呼吸', practiceDate: new Date().toISOString().split('T')[0], id: null });
                    fetchGASData();
                    setView('personal');
                } catch (e) { alert("失敗"); } finally { setIsSubmitting(false); }
            };

            const deleteLog = async (id) => {
                if(!confirm("確定刪除？")) return;
                try {
                    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'DELETE', id, email: user.email }) });
                    fetchGASData();
                } catch (e) { alert("刪除失敗"); }
            };

            const editLog = (log) => {
                setFormData({ ...log, practiceDate: log.date, focusChakra: log.chakra, id: log.id || true });
                setView('record');
            };

            // 分頁邏輯
            const filteredPartners = globalLogs.filter(l => 
                (searchTerm === '' || l.name.includes(searchTerm)) && 
                (filterChakra === '全部' || l.chakra === filterChakra)
            );
            const paginatedPartners = filteredPartners.slice((currentPage-1)*10, currentPage*10);

            if (loading) return <div className="flex h-screen items-center justify-center text-emerald-500 font-bold">載入中...</div>;

            if (!user) return (
                <div className="flex flex-col items-center justify-center h-screen px-10 text-center bg-white">
                    <h1 className="text-3xl font-black text-emerald-600 mb-2">100天禪定打卡計畫</h1>
                    <p className="text-slate-400 text-sm mb-10">簡單、清新、專注</p>
                    <div id="g_id_onload" data-client_id={GOOGLE_CLIENT_ID} data-callback="handleGoogleLogin"></div>
                    <div className="g_id_signin" data-type="standard"></div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col pb-24 bg-white">
                    <header className="p-6 pt-10 text-center border-b border-slate-50">
                        <p className="text-xs font-medium text-slate-500 leading-relaxed mb-2">
                            「禪令忙碌的人找到寧靜，禪令痛苦的人解脫煩惱，<br/>禪令快樂的人獲得智慧，禪令不平凡的人，明瞭平凡的真諦。」
                        </p>
                        <p className="text-[10px] text-emerald-600 font-bold">禪宗第 85 代宗師 悟覺妙天禪師</p>
                    </header>

                    <main className="p-5 flex-1 overflow-y-auto">
                        {view === 'home' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black text-slate-800">你好, {user.name}</h2>
                                    <button onClick={() => {setUser(null); localStorage.clear();}} className="text-slate-300"><Icon name="LogOut" /></button>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-[2rem]">
                                    <h3 className="font-bold text-slate-700 mb-4 flex items-center gap-2"><Icon name="Home" className="w-4 h-4 text-emerald-500"/> 禪定日曆</h3>
                                    <div className="calendar-grid">
                                        {Array.from({length: 31}).map((_, i) => {
                                            const day = i + 1;
                                            const hasLog = myLogs.some(l => new Date(l.date).getDate() === day);
                                            return <div key={i} className={`aspect-square flex items-center justify-center rounded-full text-xs font-bold ${hasLog ? 'bg-emerald-500 text-white' : 'bg-white text-slate-200'}`}>{day}</div>;
                                        })}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'progress' && (
                            <div className="space-y-6">
                                <h3 className="font-black text-lg">成長進度</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-emerald-50 p-5 rounded-3xl">
                                        <p className="text-[10px] font-bold text-emerald-600 uppercase">累積次數</p>
                                        <div className="text-3xl font-black text-emerald-700">{myLogs.length}</div>
                                        <p className="text-[10px] text-emerald-600 mt-1">Level {myLogs.length >= 100 ? 4 : myLogs.length >= 70 ? 3 : myLogs.length >= 50 ? 2 : 1}</p>
                                    </div>
                                    <div className="bg-blue-50 p-5 rounded-3xl">
                                        <p className="text-[10px] font-bold text-blue-600 uppercase">連續天數</p>
                                        <div className="text-3xl font-black text-blue-700">{streaks}</div>
                                        <p className="text-[10px] text-blue-600 mt-1">繼續保持！</p>
                                    </div>
                                </div>
                                <div className="bg-white border border-slate-100 p-5 rounded-3xl">
                                    <h4 className="font-bold text-sm mb-3">勳章挑戰</h4>
                                    <div className="flex gap-3 overflow-x-auto pb-2">
                                        {[7, 21, 50, 100].map(d => (
                                            <div key={d} className={`min-w-[80px] p-3 rounded-2xl text-center border ${streaks >= d ? 'border-emerald-500 bg-emerald-50 text-emerald-700' : 'border-slate-100 text-slate-300'}`}>
                                                <div className="text-lg font-black">{d}</div>
                                                <div className="text-[10px]">DAYS</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'record' && (
                            <div className="space-y-4">
                                <h3 className="font-black text-lg">紀錄禪定</h3>
                                <input type="date" className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold" value={formData.practiceDate} onChange={e=>setFormData({...formData, practiceDate:e.target.value})} />
                                <input type="number" placeholder="時長 (分鐘)" className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold" value={formData.duration} onChange={e=>setFormData({...formData, duration:e.target.value})} />
                                <select className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold" value={formData.focusChakra} onChange={e=>setFormData({...formData, focusChakra:e.target.value})}>
                                    {CHAKRAS.map(c=><option key={c} value={c}>{c}</option>)}
                                </select>
                                <textarea placeholder="心得..." className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold min-h-[120px]" value={formData.reflection} onChange={e=>setFormData({...formData, reflection:e.target.value})} />
                                <button onClick={handleSubmit} className={`w-full py-5 rounded-3xl font-black text-white transition-all ${formData.duration >= 60 ? 'bg-purple-500' : formData.duration >= 40 ? 'bg-orange-500' : 'bg-emerald-600'}`}>
                                    {isSubmitting ? '傳送中...' : '送出禪定紀錄'}
                                </button>
                            </div>
                        )}

                        {view === 'personal' && (
                            <div className="space-y-4">
                                <h3 className="font-black text-lg">我的日誌</h3>
                                {myLogs.map((log, i) => (
                                    <div key={i} className="bg-white border border-slate-100 p-5 rounded-3xl shadow-sm relative">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <span className="text-[10px] font-bold text-emerald-500">{log.date}</span>
                                                <p className="font-bold text-slate-700">{log.duration} min · {log.chakra}</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={()=>editLog(log)} className="p-2 text-slate-300 hover:text-blue-500"><Icon name="Edit" className="w-4 h-4"/></button>
                                                <button onClick={()=>deleteLog(log.id)} className="p-2 text-slate-300 hover:text-red-500"><Icon name="Trash" className="w-4 h-4"/></button>
                                            </div>
                                        </div>
                                        <p className="text-sm text-slate-400 mt-2 italic leading-relaxed">「{log.reflection}」</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'partners' && (
                            <div className="space-y-4">
                                <div className="flex gap-2">
                                    <input placeholder="搜尋人名" className="flex-1 p-3 bg-slate-50 rounded-xl text-xs font-bold border-none" onChange={e=>{setSearchTerm(e.target.value); setCurrentPage(1);}} />
                                    <select className="p-3 bg-slate-50 rounded-xl text-xs font-bold border-none" onChange={e=>{setFilterChakra(e.target.value); setCurrentPage(1);}}>
                                        <option value="全部">全部</option>
                                        {CHAKRAS.map(c=><option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                {paginatedPartners.map((log, i) => (
                                    <div key={i} className="p-4 bg-slate-50 rounded-2xl">
                                        <div className="flex justify-between text-[10px] font-bold mb-1">
                                            <span className="text-emerald-600">{log.name}</span>
                                            <span className="text-slate-300">{log.date}</span>
                                        </div>
                                        <p className="text-xs font-bold text-slate-600">{log.duration} min · {log.chakra}</p>
                                        <p className="text-xs text-slate-400 italic mt-1 leading-relaxed">「{log.reflection}」</p>
                                    </div>
                                ))}
                                <div className="flex justify-center gap-4 mt-4">
                                    <button disabled={currentPage===1} onClick={()=>setCurrentPage(p=>p-1)} className="text-emerald-500 font-bold disabled:text-slate-200 text-sm">上一頁</button>
                                    <span className="text-sm font-bold text-slate-400">{currentPage}</span>
                                    <button disabled={paginatedPartners.length < 10} onClick={()=>setCurrentPage(p=>p+1)} className="text-emerald-500 font-bold disabled:text-slate-200 text-sm">下一頁</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-6 right-6 bg-white/80 backdrop-blur-lg rounded-[2.5rem] p-2 flex justify-around items-center nav-shadow border border-slate-100">
                        {[
                            {id:'home', icon:'Home'}, {id:'progress', icon:'Trophy'}, 
                            {id:'record', icon:'Plus'}, {id:'personal', icon:'Book'}, {id:'partners', icon:'Users'}
                        ].map(item => (
                            <button key={item.id} onClick={()=>setView(item.id)} className={`p-4 rounded-full transition-all ${view===item.id?'bg-emerald-600 text-white shadow-lg shadow-emerald-200': 'text-slate-300'}`}>
                                <Icon name={item.icon} className="w-5 h-5" />
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
