<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100天禪定打卡計畫</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-[#F8FAFC]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 設定區 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbylgmrDktw1X5h2d7gRiLZirQSDQLJF2N-WlsmB3eyEwAYsAqhQ9m0YF29T_ImGLDAT/exec";
        // 已修正：移除 Client ID 中間的空格
        const GOOGLE_CLIENT_ID = "898764620568-6h1uavirukt1k1vpfomfdbge74823vm.apps.googleusercontent.com";

        const CHAKRAS = ["腹式呼吸", "名色", "無始", "無明", "吉祥", "如意", "明心", "二空", "智慧", "法眼", "禪心"];
        
        const ZEN_LEVELS = [
            { stage: 1, threshold: 1, name: "靜心起步", iconName: "Sunrise" },
            { stage: 2, threshold: 4, name: "呼吸自在", iconName: "Wind" },
            { stage: 3, threshold: 8, name: "專注當下", iconName: "Smile" },
            { stage: 4, threshold: 12, name: "身心舒坦", iconName: "Heart" },
            { stage: 5, threshold: 16, name: "智慧湧現", iconName: "Zap" },
            { stage: 6, threshold: 20, name: "情緒穩定", iconName: "ShieldCheck" },
            { stage: 7, threshold: 24, name: "覺察清晰", iconName: "Eye" },
            { stage: 8, threshold: 28, name: "與我合一", iconName: "Leaf" },
            { stage: 9, threshold: 31, name: "行路明燈", iconName: "Coffee" },
            { stage: 10, threshold: 33, name: "圓滿自在", iconName: "Crown" },
        ];

        // 圖標渲染組件
        const Icon = ({ name, size = 20, className = "" }) => {
            const LucideIcon = lucide[name];
            return LucideIcon ? <LucideIcon size={size} className={className} /> : null;
        };

        // 安全文字轉換：防止 React 渲染 Object 導致崩潰 (Error #130)
        const safeText = (val) => (val === null || val === undefined) ? "" : String(val);

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('mine');
            const [globalLogs, setGlobalLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [currentMonth, setCurrentMonth] = useState(new Date());
            const [formData, setFormData] = useState({
                duration: '', reflection: '', focusChakra: '腹式呼吸', practiceDate: new Date().toISOString().split('T')[0]
            });

            // 初始化與處理 Google 登入
            useEffect(() => {
                window.handleGoogleLogin = (response) => {
                    const payload = JSON.parse(atob(response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                    const loggedInUser = { email: payload.email, name: payload.name };
                    setUser(loggedInUser);
                    localStorage.setItem('zenUser', JSON.stringify(loggedInUser));
                };

                const savedUser = localStorage.getItem('zenUser');
                if (savedUser) setUser(JSON.parse(savedUser));
                fetchGASData();
            }, []);

            const fetchGASData = async () => {
                try {
                    const res = await fetch(GAS_URL);
                    const data = await res.json();
                    // 資料清洗：確保每個欄位都是 React 可渲染的格式
                    setGlobalLogs(data.map(r => ({
                        email: safeText(r.Email || r.email),
                        name: safeText(r.Name || r.name || "無名"),
                        date: safeText(r.date || r.Date || "").split('T')[0],
                        duration: parseInt(r.Duration || r.duration || 0),
                        chakra: safeText(r.Chakra || r.chakra || "未選"),
                        reflection: safeText(r.Reflection || r.reflection)
                    })));
                } catch (e) { console.error("GAS 讀取失敗", e); }
                setLoading(false);
            };

            const myLogs = useMemo(() => user ? globalLogs.filter(l => l.email === user.email) : [], [user, globalLogs]);

            const currentPoints = useMemo(() => {
                const days = {};
                myLogs.forEach(l => {
                    let w = l.duration >= 60 ? 2 : (l.duration >= 40 ? 1.5 : 1);
                    if (!days[l.date] || w > days[l.date]) days[l.date] = w;
                });
                const total = Object.values(days).reduce((a, b) => a + b, 0);
                return Math.min(33, parseFloat(total.toFixed(1)));
            }, [myLogs]);

            const currentLevel = [...ZEN_LEVELS].reverse().find(l => currentPoints >= l.threshold) || ZEN_LEVELS[0];

            const handleSubmit = async () => {
                if (!user || isSubmitting || !formData.duration) return;
                setIsSubmitting(true);
                // 對齊 GAS 接收的欄位名稱
                const payload = { 
                    email: user.email, 
                    name: user.name, 
                    date: formData.practiceDate, 
                    duration: formData.duration, 
                    chakra: formData.focusChakra, 
                    reflection: formData.reflection 
                };
                
                try {
                    await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    setFormData({ ...formData, duration: '', reflection: '' });
                    alert("紀錄已成功同步！");
                    fetchGASData();
                } catch (e) { alert("連線後台失敗"); }
                setIsSubmitting(false);
            };

            // 月曆邏輯
            const calendarDays = useMemo(() => {
                const year = currentMonth.getFullYear();
                const month = currentMonth.getMonth();
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const days = [];
                for (let i = 0; i < firstDay; i++) days.push(null);
                for (let d = 1; d <= daysInMonth; d++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                    const dayLogs = myLogs.filter(l => l.date === dateStr);
                    days.push({ day: d, hasRecord: dayLogs.length > 0 });
                }
                return days;
            }, [currentMonth, myLogs]);

            if (loading) return <div className="flex h-screen items-center justify-center font-bold text-slate-400">修行資料讀取中...</div>;

            if (!user) return (
                <div className="flex flex-col items-center justify-center h-screen space-y-6">
                    <div className="text-center">
                        <h1 className="text-3xl font-black text-slate-800">100天禪定打卡</h1>
                        <p className="text-slate-500 mt-2 font-medium">請登入以同步您的修行紀錄</p>
                    </div>
                    <div id="g_id_onload" data-client_id={GOOGLE_CLIENT_ID} data-callback="handleGoogleLogin"></div>
                    <div className="g_id_signin" data-type="standard" data-shape="pill"></div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto pb-24">
                    {/* 進度條 */}
                    <div className="bg-white p-6 sticky top-0 z-10 border-b border-slate-100 shadow-sm">
                        <div className="flex justify-between items-end mb-3">
                            <div className="flex items-center gap-3">
                                <div className="w-12 h-12 bg-emerald-600 rounded-2xl flex items-center justify-center text-white shadow-lg">
                                    <Icon name={currentLevel.iconName} size={24} />
                                </div>
                                <div>
                                    <h2 className="text-sm font-black text-slate-900">{currentLevel.name}</h2>
                                    <p className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">{user.name}</p>
                                </div>
                            </div>
                            <div className="text-right">
                                <span className="text-2xl font-black text-emerald-600">{currentPoints}</span>
                                <span className="text-xs font-bold text-slate-300"> / 33</span>
                            </div>
                        </div>
                        <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                            <div className="h-full bg-emerald-500 transition-all duration-1000" style={{ width: `${(currentPoints/33)*100}%` }}></div>
                        </div>
                    </div>

                    <div className="px-4 mt-6 space-y-6">
                        {/* 頁籤切換 */}
                        <div className="flex bg-white p-1 rounded-2xl shadow-sm border border-slate-100">
                            <button onClick={() => setView('mine')} className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all ${view==='mine'?'bg-emerald-600 text-white shadow-md':'text-slate-400'}`}>今日打卡</button>
                            <button onClick={() => setView('global')} className={`flex-1 py-3 rounded-xl text-sm font-bold transition-all ${view==='global'?'bg-emerald-600 text-white shadow-md':'text-slate-400'}`}>夥伴心得</button>
                        </div>

                        {view === 'mine' ? (
                            <div className="space-y-6">
                                {/* 表單 */}
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 space-y-4">
                                    <div className="grid grid-cols-2 gap-3">
                                        <input type="date" className="p-3 bg-slate-50 rounded-xl text-sm" value={formData.practiceDate} onChange={e=>setFormData({...formData, practiceDate:e.target.value})} />
                                        <input type="number" placeholder="分鐘" className="p-3 bg-slate-50 rounded-xl text-sm" value={formData.duration} onChange={e=>setFormData({...formData, duration:e.target.value})} />
                                    </div>
                                    <select className="w-full p-3 bg-slate-50 rounded-xl text-sm" value={formData.focusChakra} onChange={e=>setFormData({...formData, focusChakra:e.target.value})}>
                                        {CHAKRAS.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                    <textarea placeholder="寫下覺察與心得..." className="w-full p-3 bg-slate-50 rounded-xl text-sm min-h-[100px]" value={formData.reflection} onChange={e=>setFormData({...formData, reflection:e.target.value})} />
                                    <button onClick={handleSubmit} disabled={isSubmitting} className="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black shadow-lg">
                                        {isSubmitting ? "傳送中..." : "確認打卡"}
                                    </button>
                                </div>

                                {/* 月曆 */}
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-4 text-xs font-bold text-slate-400">
                                        <span>修行月曆</span>
                                        <span>{currentMonth.getFullYear()} / {currentMonth.getMonth()+1}</span>
                                    </div>
                                    <div className="grid grid-cols-7 gap-1 text-center">
                                        {calendarDays.map((d, i) => (
                                            <div key={i} className={`aspect-square flex items-center justify-center rounded-lg text-[10px] font-bold ${d?.hasRecord ? 'bg-emerald-100 text-emerald-700' : 'text-slate-300'}`}>
                                                {d ? d.day : ""}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                {globalLogs.map((log, i) => (
                                    <div key={i} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <h4 className="font-black text-slate-800 text-sm">{log.name}</h4>
                                                <p className="text-[10px] text-slate-400 font-bold">{log.date} · {log.chakra}</p>
                                            </div>
                                            <div className="px-2 py-1 bg-emerald-50 text-emerald-600 rounded-lg text-[10px] font-black">{log.duration} MIN</div>
                                        </div>
                                        <p className="text-xs text-slate-600 italic bg-slate-50 p-3 rounded-xl">「{log.reflection}」</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
