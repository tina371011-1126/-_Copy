<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100天禪定打卡計畫</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #FFFFFF; color: #334155; }
        .nav-shadow { box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.05); }
        /* 隱藏捲軸但保持功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo } = React;

        const GAS_URL = "https://script.google.com/macros/s/AKfycbz0U7O7f6Z44Ep6EQbSJEuXqJIw-wfvJZHw5IFSWyjMFtQsavZUCmf4vIVlTjHiuS4b/exec";
        const GOOGLE_CLIENT_ID = "898764620568-6h1uavirukt1k1vpfpvmfdbge74823vm.apps.googleusercontent.com";
        const CHAKRAS = ["腹式呼吸", "名色 脈輪", "無始 脈輪", "無明 脈輪", "吉祥 脈輪", "如意 脈輪", "明心 脈輪", "二空 脈輪", "智慧 脈輪", "法眼 脈輪", "禪心 脈輪"];

        const durationColor = (min) => {
            const m = Number(min);
            if (m >= 60) return 'bg-purple-500 text-white';
            if (m >= 40) return 'bg-orange-400 text-white';
            return 'bg-emerald-500 text-white';
        };

        const Icon = ({ name, className = "" }) => {
            const icons = {
                Home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                Trophy: <><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55-.47.98-.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></>,
                Plus: <><path d="M12 5v14M5 12h14"/></>,
                Book: <><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/></>,
                Users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                Edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
                Trash: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10"/>}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('home');
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [selectedDateRecords, setSelectedDateRecords] = useState(null);

            const [searchTerm, setSearchTerm] = useState('');
            const [filterChakra, setFilterChakra] = useState('');

            const [formData, setFormData] = useState({
                customName: '', 
                duration: '', reflection: '', focusChakra: '腹式呼吸',
                practiceDate: new Date().toISOString().split('T')[0]
            });

            const fetchLogs = async () => {
                try {
                    const res = await fetch(GAS_URL);
                    const data = await res.json();
                    setLogs(Array.isArray(data) ? data : []);
                } catch (e) {
                    console.error('fetchLogs error:', e);
                } finally {
                    setLoading(false);
                }
            };

            const deleteLog = async (log) => {
                if (!confirm("確定要刪除這筆紀錄嗎？")) return;
                
                // 瞬間更新 UI (樂觀更新)
                setLogs(prev => prev.filter(l => !(l.email === log.email && l.date === log.date && l.duration === log.duration)));
                
                // 背景執行非同步刪除
                fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ ...log, action: 'delete' })
                }).catch(e => console.error("刪除失敗", e));
            };

            useEffect(() => {
                window.handleGoogleLogin = (response) => {
                    const base64 = response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                    const jsonPayload = decodeURIComponent(atob(base64).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
                    const payload = JSON.parse(jsonPayload);
                    const loggedInUser = { email: payload.email, name: payload.name };
                    setUser(loggedInUser);
                    setFormData(prev => ({ ...prev, customName: loggedInUser.name }));
                    localStorage.setItem('zenUser_v2', JSON.stringify(loggedInUser));
                };

                const saved = localStorage.getItem('zenUser_v2');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    setUser(parsed);
                    setFormData(prev => ({ ...prev, customName: parsed.name }));
                }

                fetchLogs();
            }, []);

            useEffect(() => {
                if (!loading && !user) {
                    const tryRender = () => {
                        if (window.google && document.getElementById("google-login-btn")) {
                            window.google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: window.handleGoogleLogin });
                            window.google.accounts.id.renderButton(document.getElementById("google-login-btn"), { theme: "outline", size: "large" });
                        } else { setTimeout(tryRender, 300); }
                    };
                    tryRender();
                }
            }, [loading, user]);

            const myLogs = useMemo(() =>
                logs.filter(l => l && l.email === user?.email)
                    .sort((a, b) => (b.date || '').localeCompare(a.date || ''))
            , [logs, user]);

            const stats = useMemo(() => {
                const dates = [...new Set(myLogs.map(l => l.date))].sort().reverse();
                if (dates.length === 0) return { total: 0, streak: 0 };
                let maxStreak = 0;
                let currentStreak = 1;
                for (let i = 0; i < dates.length - 1; i++) {
                    const d1 = new Date(dates[i]);
                    const d2 = new Date(dates[i+1]);
                    const diff = (d1 - d2) / (1000 * 60 * 60 * 24);
                    if (diff === 1) { currentStreak++; } 
                    else { maxStreak = Math.max(maxStreak, currentStreak); currentStreak = 1; }
                }
                maxStreak = Math.max(maxStreak, currentStreak);
                return { total: dates.length, streak: maxStreak };
            }, [myLogs]);

            const calendarMap = useMemo(() => {
                const map = {};
                const now = new Date();
                const year = now.getFullYear();
                const month = now.getMonth();
                myLogs.forEach(l => {
                    const d = new Date(l.date);
                    if (d.getFullYear() === year && d.getMonth() === month) {
                        const day = d.getDate();
                        if (!map[day]) map[day] = [];
                        map[day].push(l);
                    }
                });
                return map;
            }, [myLogs]);

            // 篩選功能：支援人名與脈輪
            const filteredLogs = useMemo(() => logs.filter(l => 
                l && (searchTerm === '' || (l.name || '').includes(searchTerm)) &&
                (filterChakra === '' || l.chakra === filterChakra)
            ), [logs, searchTerm, filterChakra]);

            const isFormValid = formData.practiceDate && formData.duration && formData.reflection.trim() && formData.customName.trim();

            if (loading) return <div className="flex h-screen items-center justify-center text-emerald-600 font-bold italic tracking-widest">LOADING...</div>;

            if (!user) return (
                <div className="flex flex-col items-center justify-center h-screen bg-white p-10 text-center">
                    <h1 className="text-4xl font-black text-emerald-600 mb-4">100天禪定打卡</h1>
                    <div id="google-login-btn"></div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white pb-24">
                    <header className="p-6 pt-10 text-center border-b border-slate-50">
                        <p className="text-xs font-medium text-slate-500 mb-2">「禪令忙碌的人找到寧靜，禪令痛苦的人解脫煩惱，禪令快樂的人獲得智慧，禪令不平凡的人，明瞭平凡的真諦。」</p>
                        <p className="text-[10px] text-emerald-600 font-bold">禪宗第 85 代宗師 悟覺妙天禪師</p>
                    </header>

                    <main className="p-5">
                        {view === 'home' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black">你好, {user.name}</h2>
                                    <button onClick={() => {setUser(null); localStorage.removeItem('zenUser_v2');}} className="text-slate-300 text-xs font-bold">登出</button>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-[2rem]">
                                    <h3 className="font-bold text-slate-700 mb-4 text-center">本月打卡日曆</h3>
                                    <div className="grid grid-cols-7 gap-2">
                                        {Array.from({length: 31}).map((_, i) => {
                                            const day = i + 1;
                                            const dayLogs = calendarMap[day] || [];
                                            const hasLog = dayLogs.length > 0;
                                            const maxDur = hasLog ? Math.max(...dayLogs.map(l => Number(l.duration))) : 0;
                                            return (
                                                <div key={i} 
                                                    onClick={() => setSelectedDateRecords({ day, logs: dayLogs })}
                                                    className={`aspect-square flex items-center justify-center rounded-full text-[10px] font-bold cursor-pointer transition-transform active:scale-90 ${hasLog ? durationColor(maxDur) : 'bg-white text-slate-200 shadow-sm'}`}>
                                                    {day}
                                                </div>
                                            );
                                        })}
                                    </div>
                                    
                                    {selectedDateRecords && (
                                        <div className="mt-6 p-4 bg-white rounded-2xl border border-emerald-100 animate-fade-in">
                                            <div className="flex justify-between items-center mb-2">
                                                <h4 className="font-bold text-emerald-700">{selectedDateRecords.day} 每日禪定紀錄</h4>
                                                <button onClick={() => setSelectedDateRecords(null)} className="text-slate-300 text-xs">關閉</button>
                                            </div>
                                            {selectedDateRecords.logs.length > 0 ? (
                                                selectedDateRecords.logs.map((l, idx) => (
                                                    <div key={idx} className="text-xs py-1 border-b border-slate-50 last:border-0">
                                                        ⚡ {l.duration}min - {l.chakra}
                                                    </div>
                                                ))
                                            ) : (
                                                <p className="text-xs text-slate-400">當日尚無紀錄</p>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'progress' && (
                            <div className="space-y-6">
                                <h2 className="text-xl font-black text-emerald-700">成長進度</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="bg-emerald-50 p-5 rounded-3xl text-center">
                                        <p className="text-xs text-emerald-600 font-bold">累積天數</p>
                                        <p className="text-3xl font-black text-emerald-700">{stats.total}</p>
                                    </div>
                                    <div className="bg-orange-50 p-5 rounded-3xl text-center">
                                        <p className="text-xs text-orange-600 font-bold">最高連續</p>
                                        <p className="text-3xl font-black text-orange-700">{stats.streak}天</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'record' && (
                            <div className="space-y-4">
                                <h2 className="text-xl font-black">紀錄你的禪定心得</h2>
                                <input type="text" placeholder="顯示名稱" className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-slate-600" value={formData.customName} onChange={e=>setFormData({...formData, customName:e.target.value})} />
                                <input type="date" className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold" value={formData.practiceDate} onChange={e=>setFormData({...formData, practiceDate:e.target.value})} />
                                <input type="number" placeholder="時長 (分鐘)" className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold" value={formData.duration} onChange={e=>setFormData({...formData, duration:e.target.value})} />
                                <select className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold appearance-none" value={formData.focusChakra} onChange={e=>setFormData({...formData, focusChakra:e.target.value})}>
                                    {CHAKRAS.map(c=><option key={c} value={c}>{c}</option>)}
                                </select>
                                <textarea placeholder="今日心得..." className="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold min-h-[120px]" value={formData.reflection} onChange={e=>setFormData({...formData, reflection:e.target.value})} />
                                <button
                                    disabled={!isFormValid || isSubmitting}
                                    onClick={() => {
                                        setIsSubmitting(true);
                                        const newLog = { email: user.email, name: formData.customName, date: formData.practiceDate, duration: formData.duration, chakra: formData.focusChakra, reflection: formData.reflection };
                                        
                                        // 瞬間更新本地 UI
                                        setLogs(prev => [newLog, ...prev]);
                                        setView('personal'); // 立即跳轉
                                        setFormData(prev => ({ ...prev, duration: '', reflection: '', practiceDate: new Date().toISOString().split('T')[0] }));
                                        
                                        // 背景同步至伺服器
                                        fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ ...newLog, action: 'add' }) })
                                            .then(() => { setIsSubmitting(false); })
                                            .catch(e => { console.error(e); setIsSubmitting(false); });
                                    }}
                                    className={`w-full py-5 rounded-3xl font-black text-white transition-all shadow-lg ${!isFormValid || isSubmitting ? 'bg-slate-200' : 'bg-emerald-600 active:scale-95'}`}
                                >
                                    {isSubmitting ? '同步中...' : '送出紀錄'}
                                </button>
                            </div>
                        )}

                        {view === 'personal' && (
                            <div className="space-y-4">
                                <h2 className="text-xl font-black">我的禪定日誌</h2>
                                {myLogs.length === 0 && <p className="text-center text-slate-300 py-8 italic">靜待你的第一筆紀錄...</p>}
                                {myLogs.map((log, i) => (
                                    <div key={i} className="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <p className="text-[10px] font-bold text-emerald-600">{log.date.replace(/-/g, '/')}</p>
                                                <p className="font-bold">{log.duration}min · {log.chakra}</p>
                                            </div>
                                            <button onClick={() => deleteLog(log)} className="p-2 text-slate-300 hover:text-red-500 transition-colors"><Icon name="Trash" /></button>
                                        </div>
                                        <p className="text-xs text-slate-500 mt-2 italic">「{log.reflection}」</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'partners' && (
                            <div className="space-y-4">
                                <h2 className="text-xl font-black">夥伴心得</h2>
                                <div className="flex gap-2">
                                    <input placeholder="搜尋姓名..." className="flex-1 p-3 bg-slate-50 rounded-xl text-xs font-bold border-none" onChange={e=>setSearchTerm(e.target.value)} />
                                    <select className="w-1/3 p-3 bg-slate-50 rounded-xl text-xs font-bold border-none appearance-none text-emerald-600" value={filterChakra} onChange={e=>setFilterChakra(e.target.value)}>
                                        <option value="">全部脈輪</option>
                                        {CHAKRAS.map(c=><option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div className="space-y-3">
                                    {filteredLogs.map((log, i) => (
                                        <div key={i} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                                            <div className="flex justify-between items-center text-sm font-bold">
                                                <span>{log.name} {Number(log.duration) >= 60 ? '👑' : ''}</span>
                                                <span className="text-[10px] text-slate-400 font-medium">{log.date}</span>
                                            </div>
                                            <p className="text-[10px] text-emerald-600 font-bold mb-1">{log.duration}min · {log.chakra}</p>
                                            <p className="text-xs text-slate-600 bg-slate-50 p-3 rounded-xl italic leading-relaxed">「{log.reflection}」</p>
                                        </div>
                                    ))}
                                    {filteredLogs.length === 0 && <p className="text-center text-slate-300 py-10">找不到相關紀錄</p>}
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-6 left-6 right-6 bg-white/90 backdrop-blur-md rounded-[2.5rem] p-2 flex justify-around items-center nav-shadow border border-slate-100">
                        {[{id:'home', icon:'Home'}, {id:'progress', icon:'Trophy'}, {id:'record', icon:'Plus'}, {id:'personal', icon:'Book'}, {id:'partners', icon:'Users'}].map(item => (
                            <button key={item.id} onClick={()=>setView(item.id)} className={`p-4 rounded-full transition-all ${view===item.id?'bg-emerald-600 text-white shadow-lg': 'text-slate-300 hover:text-slate-400'}`}>
                                <Icon name={item.icon} />
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
